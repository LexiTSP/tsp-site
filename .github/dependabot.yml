version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5
    groups:
      site-runtime:
        patterns:
          - "next"
          - "next-intl"
          - "react"
          - "react-dom"
      site-tooling:
        patterns:
          - "typescript"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: "npm"
    directory: "/packages/lexitsp-sdk"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:15"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/packages/trustbadge-react"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:30"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:45"
      timezone: "Europe/Oslo"
    open-pull-requests-limit: 5
