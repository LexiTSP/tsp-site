name: Spec / RFC proposal
description: Propose a protocol, schema, manifest, verification, or governance change.
title: "[RFC]: "
labels: ["rfc", "spec"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What gap or interoperability issue does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the schema/API change, optionality, versioning, and migration path.
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: Does this preserve existing TrustEnvelope validation, manifests, and v3 test vectors?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or references
      description: Link to specs, standards, implementation notes, or test vectors.
